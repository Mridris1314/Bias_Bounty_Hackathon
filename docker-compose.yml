services:
  qdrant:
    image: qdrant/qdrant:v1.12.0
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "sh", "-c", "wget -qO- http://localhost:6333/readyz | grep -q ok"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      APP_ENV: dev
      GROQ_API_KEY: ${GROQ_API_KEY}
      QDRANT_URL: http://qdrant:6333
      QDRANT_API_KEY: ""
      QDRANT_COLLECTION: regulations
      CORS_ORIGINS: '["http://localhost:3000"]'
    depends_on:
      qdrant:
        condition: service_healthy
    volumes:
      - backend_data:/app/data

volumes:
  qdrant_data:
  backend_data:
