services:
  - type: web
    name: biasbounty-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: prod
      - key: GEMINI_API_KEY
        sync: false                    # set in Render dashboard — powers the crew brain
      - key: GROQ_API_KEY
        sync: false                    # optional — only needed if CREW_LLM_MODEL uses groq/
      - key: QDRANT_URL
        sync: false
      - key: QDRANT_API_KEY
        sync: false
      - key: QDRANT_COLLECTION
        value: regulations
      - key: CREW_LLM_MODEL
        # Gemini's free tier caps at 20 requests/DAY per model PER PROJECT
        # (not per key — multiple keys from the same account/project share
        # one exhausted pool). That's a hard wall retries can't fix, and it
        # kept blocking real usage of the live site. Groq resets per-MINUTE
        # instead, and the pipeline's 2-LLM-call design fits comfortably
        # within its free-tier TPM cap — switch back to
        # gemini/gemini-2.5-flash-lite if a genuinely fresh Gemini project
        # becomes available.
        value: groq/llama-3.1-8b-instant
      - key: MAX_PROMPTS_PER_DIMENSION
        value: "4"
      - key: ENABLE_RETRY
        value: "true"
      - key: MAX_RETRIES
        value: "5"
      - key: INTER_AGENT_PACING_S
        value: "15"
      - key: CORS_ORIGINS
        value: '["https://bias-bounty-hackathon.vercel.app"]'
