services:
  - type: web
    name: biasbounty-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: prod
      - key: GEMINI_API_KEY
        sync: false                    # set in Render dashboard — powers the crew brain
      - key: GROQ_API_KEY
        sync: false                    # optional — only needed if CREW_LLM_MODEL uses groq/
      - key: QDRANT_URL
        sync: false
      - key: QDRANT_API_KEY
        sync: false
      - key: QDRANT_COLLECTION
        value: regulations
      - key: CREW_LLM_MODEL
        # gemini-2.5-flash's free tier caps at just 20 requests/DAY —
        # exhausted within ~20 minutes of light testing, not something
        # retries can fix (a daily cap doesn't reset with backoff). The
        # "-lite" variant is built for high free-tier throughput and has
        # a far more generous daily allowance with the same reliability.
        # (gemini-2.0-flash and gemini-2.0-flash-lite currently show a
        # hard 0 free-tier quota on this key — seemingly deprecated for
        # free access — so avoid those for now.)
        value: gemini/gemini-2.5-flash-lite
      - key: MAX_PROMPTS_PER_DIMENSION
        value: "4"
      - key: ENABLE_RETRY
        value: "true"
      - key: MAX_RETRIES
        value: "5"
      - key: INTER_AGENT_PACING_S
        value: "15"
      - key: CORS_ORIGINS
        value: '["https://bias-bounty-hackathon.vercel.app"]'
