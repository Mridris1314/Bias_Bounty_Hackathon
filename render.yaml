services:
  - type: web
    name: biasbounty-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: prod
      - key: GEMINI_API_KEY
        sync: false                    # set in Render dashboard — powers the crew brain
      - key: GROQ_API_KEY
        sync: false                    # optional — only needed if CREW_LLM_MODEL uses groq/
      - key: QDRANT_URL
        sync: false
      - key: QDRANT_API_KEY
        sync: false
      - key: QDRANT_COLLECTION
        value: regulations
      - key: CREW_LLM_MODEL
        # Gemini's free tier caps at 20 requests/DAY per model per project
        # — a hard wall retries can't fix, easily exhausted by a day of
        # testing. Groq (groq/llama-3.1-8b-instant) is the fallback if
        # this key's daily quota runs out and a fresh key isn't handy —
        # it resets per-MINUTE instead, and the pipeline's 2-LLM-call
        # design fits comfortably within Groq's free-tier TPM cap.
        value: gemini/gemini-2.5-flash-lite
      - key: MAX_PROMPTS_PER_DIMENSION
        value: "4"
      - key: ENABLE_RETRY
        value: "true"
      - key: MAX_RETRIES
        value: "5"
      - key: INTER_AGENT_PACING_S
        value: "15"
      - key: CORS_ORIGINS
        value: '["https://bias-bounty-hackathon.vercel.app"]'
